<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050505">
<title>YOJI & HANA — WILD ELECTRIC MEMORY</title>
<link rel="preload" href="logo.webp" as="image">
<style>
:root{--x:50vw;--y:50vh;--acid:#d8ff39;--red:#ff4933;--blue:#69bcff;--ink:#050505;--paper:#eee8dc}*{box-sizing:border-box}html,body{margin:0;background:var(--ink);color:#fff;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}body.lock{overflow:hidden}img{display:block;width:100%;height:100%;object-fit:cover}.progress{position:fixed;z-index:3000;left:0;top:0;height:3px;width:100%;transform:scaleX(0);transform-origin:left;background:linear-gradient(90deg,var(--red),var(--acid),var(--blue))}.cursor-dot,.cursor-lens{position:fixed;z-index:4000;pointer-events:none;opacity:0;transform:translate(-50%,-50%);mix-blend-mode:difference}.cursor-dot{width:8px;height:8px;border-radius:50%;background:#fff}.cursor-lens{width:120px;height:120px;border:1px solid #fff;border-radius:50%;backdrop-filter:invert(1) contrast(1.2);transition:width .25s,height .25s,opacity .25s}.pointer-wash{position:fixed;z-index:2000;inset:0;pointer-events:none;background:radial-gradient(circle 240px at var(--x) var(--y),rgba(216,255,57,.16),rgba(105,188,255,.06) 35%,transparent 70%);mix-blend-mode:screen}.topbar{position:fixed;z-index:2500;inset:0 0 auto;display:flex;justify-content:space-between;padding:16px 18px;font-size:10px;letter-spacing:.24em;text-transform:uppercase;mix-blend-mode:difference}.topbar a{color:#fff;text-decoration:none}
#film{position:fixed;z-index:3500;inset:0;background:#000;overflow:hidden;transition:opacity 1s,visibility 1s}#film.done{opacity:0;visibility:hidden;pointer-events:none}.film-stage{position:absolute;inset:0}.film-shot,.film-shot:before{position:absolute;inset:0;background-image:var(--img);background-repeat:no-repeat}.film-shot{opacity:0;transition:opacity 1.1s ease;overflow:hidden;background-size:contain;background-position:var(--pos,50% 50%);background-color:#000}.film-shot:before{content:"";inset:-4%;background-size:cover;background-position:var(--pos,50% 50%);filter:blur(34px) brightness(.35) saturate(.9);transform:scale(1.12);z-index:-1}.film-shot.active{opacity:1}.film-shot.active .film-pan{animation:drift 5.5s ease-out both}.film-shot:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,transparent 0 28%,rgba(0,0,0,.12) 55%,rgba(0,0,0,.8) 100%)}.film-pan{position:absolute;inset:0;background-image:var(--img);background-size:contain;background-position:var(--pos,50% 50%);background-repeat:no-repeat}.film-caption{position:absolute;z-index:5;left:50%;bottom:13vh;transform:translateX(-50%) translateY(24px);width:min(88vw,950px);text-align:center;font-weight:900;font-size:clamp(15px,2.2vw,30px);letter-spacing:.16em;text-transform:uppercase;opacity:0;transition:.7s;text-shadow:0 4px 30px #000}.film-caption.show{opacity:1;transform:translateX(-50%) translateY(0)}.film-logo{position:absolute;z-index:5;left:50%;top:48%;width:min(78vw,720px);height:auto;transform:translate(-50%,-50%) scale(.45) rotate(-5deg);opacity:0;filter:blur(20px);transition:1.6s}.film-logo.show{opacity:1;filter:drop-shadow(0 0 30px rgba(216,255,57,.35));transform:translate(-50%,-50%) scale(1)}.film-meta{position:absolute;z-index:6;left:18px;right:18px;top:18px;display:flex;justify-content:space-between;font-size:10px;letter-spacing:.22em;text-transform:uppercase}.film-skip{position:absolute;z-index:6;right:18px;bottom:18px;border:1px solid rgba(255,255,255,.5);background:rgba(0,0,0,.35);color:#fff;padding:10px 14px;font-size:9px;letter-spacing:.2em;text-transform:uppercase}.film-bar{position:absolute;z-index:6;left:0;right:0;bottom:0;height:3px;background:#222}.film-bar i{display:block;height:100%;transform:scaleX(0);transform-origin:left;background:linear-gradient(90deg,var(--red),var(--acid),var(--blue));animation:filmbar 45s linear forwards}
.hero{height:100svh;position:relative;overflow:hidden}.hero-bg{position:absolute;inset:-4%;background:url('photos/IMG_9177.jpg') center 35%/cover no-repeat;filter:brightness(.55) contrast(1.15);transform:scale(1.08)}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,rgba(0,0,0,.2) 60%,#050505)}.hero-logo{position:absolute;z-index:2;top:8vh;left:50%;width:min(76vw,560px);height:auto;transform:translateX(-50%)}.hero h1{position:absolute;z-index:2;left:3vw;bottom:6vh;margin:0;font-size:clamp(58px,18vw,220px);line-height:.72;letter-spacing:-.08em;text-transform:uppercase}.hero h1 span{display:block}.wire{color:transparent;-webkit-text-stroke:1px #fff}.manifesto{min-height:90svh;display:grid;place-items:center;padding:10vh 5vw}.manifesto p{max-width:1300px;margin:0;font-size:clamp(40px,9vw,126px);font-weight:900;line-height:.9;letter-spacing:-.06em;text-transform:uppercase}.manifesto em{font-family:Georgia,serif;font-weight:400;color:var(--red)}.chapter{padding:10vh 3vw 3vh}.chapter small{display:block;color:var(--acid);font-size:10px;letter-spacing:.28em;text-transform:uppercase}.chapter h2{margin:8px 0 0;font-size:clamp(54px,13vw,160px);line-height:.76;letter-spacing:-.07em;text-transform:uppercase}
.memory-field{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-flow:dense;gap:7px;padding:4vh 2vw 14vh}.memory-card{position:relative;min-height:34vh;overflow:hidden;background:#111;transform-style:preserve-3d;isolation:isolate}.memory-card:nth-child(7n+1){grid-column:span 7;min-height:72vh}.memory-card:nth-child(7n+2){grid-column:span 5;min-height:72vh}.memory-card:nth-child(7n+3),.memory-card:nth-child(7n+4),.memory-card:nth-child(7n+5){grid-column:span 4;min-height:48vh}.memory-card:nth-child(7n+6){grid-column:span 5;min-height:60vh}.memory-card:nth-child(7n){grid-column:span 7;min-height:60vh}.memory-card img{transition:transform .8s ease,filter .8s ease;will-change:transform}.memory-card:after{content:attr(data-no);position:absolute;right:10px;bottom:8px;font-size:9px;letter-spacing:.2em;text-shadow:0 2px 15px #000}.memory-card:hover img{filter:saturate(1.12) contrast(1.08)}.memory-card.focus .ghost{opacity:.45}.ghost{position:absolute;inset:0;mix-blend-mode:screen;opacity:0;transform:translate(var(--gx,0),var(--gy,0));transition:opacity .2s;filter:contrast(1.25) saturate(1.2)}.interlude{min-height:80vh;display:grid;place-items:center;background:var(--paper);color:#111;padding:10vh 5vw}.interlude p{max-width:1200px;margin:0;text-align:center;font-family:Georgia,serif;font-style:italic;font-size:clamp(38px,8vw,100px);line-height:.95;letter-spacing:-.04em}.finale{height:110svh;position:relative;display:grid;place-items:center;overflow:hidden}.finale:before{content:"";position:absolute;inset:0;background:url('photos/IMG_9671.jpg') center/cover no-repeat;filter:grayscale(1) contrast(1.2);opacity:.35}.finale:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at var(--x) var(--y),transparent,#000 72%)}.finale img{position:relative;z-index:2;width:min(84vw,760px);height:auto}.finale span{position:absolute;z-index:2;bottom:5vh;font-size:10px;letter-spacing:.3em;text-transform:uppercase}
@keyframes drift{from{transform:scale(1.04) translate3d(-1%,1%,0)}to{transform:scale(1) translate3d(1%,-1%,0)}}@keyframes filmbar{to{transform:scaleX(1)}}@media(max-width:760px){.memory-field{grid-template-columns:1fr 1fr}.memory-card,.memory-card:nth-child(n){grid-column:auto;min-height:42svh}.memory-card:nth-child(5n+1){grid-column:span 2;min-height:60svh}.film-caption{bottom:16vh;font-size:13px}}@media(pointer:fine){body{cursor:none}}@media(prefers-reduced-motion:reduce){#film{display:none}.memory-card img{transition:none}}
</style>
</head>
<body class="lock">
<div class="progress"></div><div class="cursor-dot"></div><div class="cursor-lens"></div><div class="pointer-wash"></div>
<div id="film"><div class="film-stage" id="filmStage"></div><div class="film-caption"></div><img class="film-logo" src="logo.webp" alt="YOJI & HANA"><div class="film-meta"><span>YOJI & HANA / MEMORY FILM</span><span class="timecode">00:00</span></div><button class="film-skip" type="button">Skip film</button><div class="film-bar"><i></i></div></div>
<nav class="topbar"><a href="#top">YOJI & HANA</a><span id="photoCount">LOADING MEMORY</span></nav>
<header class="hero" id="top"><div class="hero-bg"></div><img class="hero-logo" src="logo.webp" alt="YOJI & HANA"><h1><span>LOVE</span><span class="wire">NOISE</span><span>MACHINE</span></h1></header>
<section class="manifesto"><p>NOT A GALLERY.<br>A <em>LIVING TRACE</em><br>OF ONE MAN,<br>ONE DOG,<br>AND THE ROAD.</p></section>
<section class="chapter"><small>All photographs / No selection</small><h2>EVERY<br>MEMORY</h2></section>
<section class="memory-field" id="memoryField"></section>
<section class="interlude"><p>“Nothing was left outside the frame.”</p></section>
<section class="finale"><img src="logo.webp" alt="YOJI & HANA"><span>A FILM YOU CAN TOUCH</span></section>
<script>
(async()=>{
 const enc=s=>'photos/'+s.split('/').map(encodeURIComponent).join('/');
 const photos=await fetch('photos.json?'+Date.now()).then(r=>r.json());
 document.getElementById('photoCount').textContent=photos.length+' PHOTOGRAPHS / ALL USED';
 const positions=['50% 35%','50% 42%','50% 50%','50% 58%','45% 50%','55% 50%','50% 30%','50% 65%'];
 const stage=document.getElementById('filmStage');
 const filmSet=photos.slice(0,12);
 filmSet.forEach((p,i)=>{const d=document.createElement('div');d.className='film-shot'+(i===0?' active':'');d.style.setProperty('--img',`url("${enc(p)}")`);d.style.setProperty('--pos',positions[i%positions.length]);d.innerHTML='<div class="film-pan"></div>';stage.appendChild(d)});
 const captions=['FIRST, A BREATH.','THEN, A LOOK.','HOME BECAME MEMORY.','WOOD BECAME A VOICE.','A MACHINE BECAME A HEARTBEAT.','THE ROAD KEPT MOVING.','NOT A GALLERY. A LIFE.','EVERY FRAME REMAINS.','NOTHING WAS LEFT OUT.','YOJI & HANA'];
 const film=document.getElementById('film'), cap=film.querySelector('.film-caption'), logo=film.querySelector('.film-logo'), shots=[...film.querySelectorAll('.film-shot')],tc=film.querySelector('.timecode');let start=performance.now(),last=-1,ended=false;
 const end=()=>{if(ended)return;ended=true;film.classList.add('done');document.body.classList.remove('lock');setTimeout(()=>film.remove(),1100)};film.querySelector('.film-skip').onclick=end;
 function tick(now){if(ended)return;const s=(now-start)/1000;tc.textContent='00:'+String(Math.min(45,Math.floor(s))).padStart(2,'0');const i=Math.min(filmSet.length-1,Math.floor(s/3.5));if(i!==last){last=i;shots.forEach((x,n)=>x.classList.toggle('active',n===i));cap.classList.remove('show');setTimeout(()=>{cap.textContent=captions[Math.min(captions.length-1,Math.floor(i/1.2))];cap.classList.add('show')},140)}if(s>40)logo.classList.add('show');if(s>=45)end();requestAnimationFrame(tick)}requestAnimationFrame(tick);
 const field=document.getElementById('memoryField');photos.forEach((p,i)=>{const f=document.createElement('figure');f.className='memory-card';f.dataset.no=String(i+1).padStart(2,'0')+' / '+photos.length;f.innerHTML=`<img loading="lazy" src="${enc(p)}" alt=""><img class="ghost" loading="lazy" src="${enc(p)}" alt="">`;field.appendChild(f)});
 const dot=document.querySelector('.cursor-dot'),lens=document.querySelector('.cursor-lens');let mx=innerWidth/2,my=innerHeight/2,lx=mx,ly=my;addEventListener('pointermove',e=>{mx=e.clientX;my=e.clientY;dot.style.cssText+=`;left:${mx}px;top:${my}px;opacity:1`;document.documentElement.style.setProperty('--x',mx+'px');document.documentElement.style.setProperty('--y',my+'px')});
 function follow(){lx+=(mx-lx)*.12;ly+=(my-ly)*.12;lens.style.left=lx+'px';lens.style.top=ly+'px';lens.style.opacity=.9;requestAnimationFrame(follow)}follow();
 field.addEventListener('pointermove',e=>{const c=e.target.closest('.memory-card');if(!c)return;const r=c.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;c.style.transform=`perspective(900px) rotateX(${y*-7}deg) rotateY(${x*9}deg)`;c.querySelector('img:not(.ghost)').style.transform=`scale(1.06) translate(${x*-14}px,${y*-14}px)`;c.style.setProperty('--gx',(x*18)+'px');c.style.setProperty('--gy',(y*18)+'px');c.classList.add('focus');lens.style.width='180px';lens.style.height='180px'});
 field.addEventListener('pointerout',e=>{const c=e.target.closest('.memory-card');if(!c)return;c.style.transform='';c.querySelector('img:not(.ghost)').style.transform='';c.classList.remove('focus');lens.style.width='120px';lens.style.height='120px'});
 addEventListener('scroll',()=>{const max=document.documentElement.scrollHeight-innerHeight,p=max?scrollY/max:0;document.querySelector('.progress').style.transform=`scaleX(${p})`;document.querySelector('.hero-bg').style.transform=`scale(1.08) translateY(${scrollY*.06}px)`},{passive:true});
})();
</script>
</body></html>
