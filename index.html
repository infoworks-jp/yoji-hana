<script src="https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.min.js"></script>
<style>
:root{--acid:#d8ff39;--red:#ff402b;--blue:#63baff;--paper:#efe9de}*{box-sizing:border-box}html,body{margin:0;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}body.film-lock{overflow:hidden}img{display:block;width:100%;height:100%;object-fit:cover}button{font:inherit}.cursor{position:fixed;z-index:1001;width:8px;height:8px;margin:-4px;border-radius:50%;background:#fff;pointer-events:none;opacity:0;mix-blend-mode:difference}.progress{position:fixed;z-index:1002;left:0;top:0;width:100%;height:3px;transform:scaleX(0);transform-origin:left;background:linear-gradient(90deg,var(--red),var(--acid),var(--blue))}
#film{position:fixed;inset:0;z-index:1000;background:#000;overflow:hidden;transition:opacity 1.4s ease,visibility 1.4s}#film.done{opacity:0;visibility:hidden;pointer-events:none}#film canvas{position:absolute;inset:0;width:100%;height:100%}.film-scene{position:absolute;inset:0;opacity:0;transition:opacity 1.6s ease,transform 7s ease;transform:scale(1.08);background:#000 center/cover no-repeat}.film-scene.active{opacity:1;transform:scale(1)}.film-scene:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 43%,transparent 0 22%,rgba(0,0,0,.25) 48%,rgba(0,0,0,.92) 100%)}.s-eye{background-image:url('hana_eye.webp');background-position:center 42%}.s-hana{background-image:url('hana_profile.webp');background-position:center 34%}.s-guitar{background-image:url('guitar_inside.webp');background-position:center}.s-machine{background-image:url('harley_wide.webp');background-position:center}.s-man{background-image:url('yoji_red.webp');background-position:center 28%}.s-snow{background-image:url('snow_hero.webp');background-position:center 25%}.film-grain{position:absolute;inset:-10%;opacity:.11;mix-blend-mode:screen;background-image:radial-gradient(circle,#fff 0 1px,transparent 1px);background-size:5px 5px;animation:grain .16s steps(2) infinite;pointer-events:none}.film-vignette{position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,transparent 0 24%,rgba(0,0,0,.22) 52%,rgba(0,0,0,.9) 100%);pointer-events:none}.caption{position:absolute;z-index:4;left:50%;bottom:12vh;transform:translateX(-50%) translateY(24px);width:min(88vw,950px);text-align:center;text-transform:uppercase;font-size:clamp(16px,2.3vw,30px);line-height:1.35;letter-spacing:.16em;font-weight:700;opacity:0;transition:opacity 1s,transform 1s;text-shadow:0 2px 30px #000}.caption.show{opacity:1;transform:translateX(-50%) translateY(0)}.chapter{position:absolute;z-index:4;left:18px;top:18px;font-size:10px;letter-spacing:.32em;text-transform:uppercase;opacity:.72}.timecode{position:absolute;z-index:4;right:18px;top:18px;font-size:10px;letter-spacing:.18em;opacity:.72}.film-title{position:absolute;z-index:5;inset:0;display:grid;place-items:center;text-align:center;opacity:0;transform:scale(.72);filter:blur(22px);transition:opacity 1.6s,transform 2.2s cubic-bezier(.16,.84,.24,1),filter 2s}.film-title.show{opacity:1;transform:scale(1);filter:none}.film-title h1{margin:0;font-size:clamp(64px,18vw,230px);line-height:.7;letter-spacing:-.09em;text-transform:uppercase}.film-title h1 span{display:block}.film-title .wire{color:transparent;-webkit-text-stroke:1.2px #fff}.film-logo{position:absolute;z-index:6;left:50%;top:48%;width:min(78vw,720px);height:auto;transform:translate(-50%,-50%) scale(.25) rotate(-8deg);opacity:0;filter:blur(24px) drop-shadow(0 0 35px rgba(216,255,57,.65));transition:opacity 2s,transform 3s cubic-bezier(.16,.84,.24,1),filter 2.5s}.film-logo.show{opacity:1;transform:translate(-50%,-50%) scale(1);filter:drop-shadow(0 0 28px rgba(216,255,57,.38))}.scan{position:absolute;z-index:7;left:0;right:0;top:50%;height:2px;background:linear-gradient(90deg,transparent,var(--acid),#fff,var(--blue),transparent);box-shadow:0 0 30px var(--acid);opacity:0}.scan.run{animation:scan 1.25s ease-out}.film-controls{position:absolute;z-index:10;left:18px;right:18px;bottom:18px;display:flex;justify-content:space-between;align-items:end}.film-controls button{border:1px solid rgba(255,255,255,.4);background:rgba(0,0,0,.28);color:#fff;padding:10px 14px;font-size:9px;letter-spacing:.22em;text-transform:uppercase}.film-note{font-size:9px;letter-spacing:.18em;text-transform:uppercase;opacity:.6}.film-bar{position:absolute;z-index:9;left:0;bottom:0;width:100%;height:3px;background:rgba(255,255,255,.15)}.film-bar i{display:block;width:100%;height:100%;background:linear-gradient(90deg,var(--red),var(--acid),var(--blue));transform:scaleX(0);transform-origin:left}.film-bar i.run{animation:filmProgress 42s linear forwards}
.topbar{position:fixed;z-index:60;inset:0 0 auto;display:flex;justify-content:space-between;padding:16px 18px;font-size:10px;letter-spacing:.24em;text-transform:uppercase;mix-blend-mode:difference}.topbar a{color:#fff;text-decoration:none}.hero{height:100svh;position:relative;overflow:hidden;background:#000}.hero:before{content:"";position:absolute;inset:-2%;background:url('hana_profile.webp') center 30%/cover no-repeat;filter:brightness(.62) contrast(1.22);transform:scale(1.04)}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.18) 42%,#000 96%)}.hero h1{position:absolute;z-index:2;left:3vw;right:3vw;bottom:6svh;margin:0;font-size:clamp(62px,20vw,220px);line-height:.7;letter-spacing:-.09em;text-transform:uppercase}.hero h1 span{display:block}.hero .wire{color:transparent;-webkit-text-stroke:1.2px #fff}.hero-logo{position:absolute;z-index:3;top:7vh;left:50%;width:min(74vw,520px);height:auto;transform:translateX(-50%);filter:drop-shadow(0 18px 40px #000)}.manifesto{min-height:95svh;display:grid;place-items:center;padding:12vh 5vw}.manifesto p{max-width:1300px;margin:0;font-size:clamp(42px,11vw,130px);line-height:.86;letter-spacing:-.065em;text-transform:uppercase;font-weight:900}.manifesto em{font-family:Georgia,serif;font-weight:400;color:var(--red)}.gallery{padding:12vh 3vw 16vh}.gallery h2{font-size:clamp(58px,14vw,160px);line-height:.75;letter-spacing:-.075em;text-transform:uppercase;margin:0 0 8vh}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}.tile{height:45vh;overflow:hidden}.tile img{transition:transform 1.4s ease}.tile:hover img{transform:scale(1.06)}.tile:nth-child(1){grid-column:span 7;height:72vh}.tile:nth-child(2){grid-column:span 5;height:72vh}.tile:nth-child(3),.tile:nth-child(4),.tile:nth-child(5){grid-column:span 4}.tile:nth-child(6){grid-column:span 8;height:62vh}.tile:nth-child(7){grid-column:span 4;height:62vh}.finale{height:110svh;position:relative;display:grid;place-items:center;overflow:hidden;background:radial-gradient(circle at 50% 44%,#27211c,#060606 46%,#000)}.finale:before{content:"";position:absolute;inset:0;background:url('hana_eye.webp') center/cover no-repeat;opacity:.11;filter:grayscale(1)}.finale img{width:min(88vw,760px);height:auto;z-index:2}.final-copy{position:absolute;bottom:5svh;letter-spacing:.28em;text-transform:uppercase;font-size:10px;color:rgba(255,255,255,.72)}
@keyframes grain{to{transform:translate(2px,-2px)}}@keyframes scan{0%{opacity:0;transform:translateY(-38vh) scaleX(.2)}25%{opacity:1}100%{opacity:0;transform:translateY(38vh) scaleX(1)}}@keyframes filmProgress{to{transform:scaleX(1)}}@media(max-width:760px){.s-hana{background-position:center 27%}.hero:before{background-position:center 24%}.grid{grid-template-columns:1fr 1fr}.tile,.tile:nth-child(n){grid-column:auto;height:42svh}.tile:nth-child(1),.tile:nth-child(6){grid-column:span 2;height:58svh}.caption{bottom:15vh;font-size:14px}}@media(pointer:fine){body{cursor:none}}@media(prefers-reduced-motion:reduce){#film{display:none}}
</style>
</head>
<body class="film-lock">
<div id="film">
  <canvas id="filmGL"></canvas>
  <div class="film-scene s-eye active"></div><div class="film-scene s-hana"></div><div class="film-scene s-guitar"></div><div class="film-scene s-machine"></div><div class="film-scene s-man"></div><div class="film-scene s-snow"></div>
  <div class="film-grain"></div><div class="film-vignette"></div>
  <div class="chapter">YOJI &amp; HANA / SHORT FILM</div><div class="timecode">00:00</div>
  <div class="caption"></div>
  <div class="film-title"><h1><span>YOJI</span><span class="wire">AND</span><span>HANA</span></h1></div>
  <img class="film-logo" src="logo.webp" alt="YOJI & HANA"><div class="scan"></div>
  <div class="film-controls"><div class="film-note">Move to disturb the memory</div><button id="skipFilm" type="button">Skip film</button></div>
  <div class="film-bar"><i></i></div>
</div>
<div class="cursor"></div><div class="progress"></div>
<nav class="topbar"><a href="#top">YOJI &amp; HANA</a><span>A FILM YOU CAN TOUCH</span></nav>
<header class="hero" id="top"><img class="hero-logo" src="logo.webp" alt="YOJI & HANA"><h1><span>WILD</span><span class="wire">ELECTRIC</span><span>MEMORY</span></h1></header>
<section class="manifesto"><p>THIS IS NOT A PAGE.<br>IT IS A <em>TRACE</em><br>OF LOVE, NOISE<br>AND MACHINE.</p></section>
<section class="gallery"><h2>MEMORY<br>FRAGMENTS</h2><div class="grid"><figure class="tile"><img src="hana_sunset.webp" alt="Hana"></figure><figure class="tile"><img src="guitar_inside.webp" alt="Guitar"></figure><figure class="tile"><img src="harley_wide.webp" alt="Harley"></figure><figure class="tile"><img src="yoji_red.webp" alt="Yoji"></figure><figure class="tile"><img src="snow_hero.webp" alt="Snow"></figure><figure class="tile"><img src="pair_face_crop.webp" alt="Yoji and Hana"></figure><figure class="tile"><img src="harley_chrome.webp" alt="Chrome"></figure></div></section>
<section class="finale"><img src="logo.webp" alt="YOJI & HANA"><div class="final-copy">A FILM YOU CAN TOUCH</div></section>
<script>
(()=>{
const film=document.getElementById('film'),skip=document.getElementById('skipFilm'),caption=document.querySelector('.caption'),title=document.querySelector('.film-title'),logo=document.querySelector('.film-logo'),scan=document.querySelector('.scan'),bar=document.querySelector('.film-bar i'),timecode=document.querySelector('.timecode'),scenes=[...document.querySelectorAll('.film-scene')];
const cues=[
{t:0,scene:0,text:'AT FIRST, THERE WAS ONLY A BREATH.'},
{t:6,scene:1,text:'THEN HANA LOOKED BACK.'},
{t:12,scene:2,text:'A STRING BECAME A VOICE.'},
{t:18,scene:3,text:'A MACHINE BECAME A HEARTBEAT.'},
{t:24,scene:4,text:'A MAN KEPT WALKING THROUGH THE NOISE.'},
{t:30,scene:5,text:'MEMORY DID NOT FADE. IT CHANGED SHAPE.'},
{t:35,title:true,text:''},
{t:38,logo:true,text:'YOJI & HANA'},
{t:42,end:true}
];
let started=performance.now(),lastCue=-1,ended=false;
function setScene(n){scenes.forEach((s,i)=>s.classList.toggle('active',i===n))}
function endFilm(){if(ended)return;ended=true;film.classList.add('done');document.body.classList.remove('film-lock');setTimeout(()=>film.remove(),1500)}
skip.addEventListener('click',endFilm);bar.classList.add('run');
function tick(now){if(ended)return;const sec=(now-started)/1000;timecode.textContent='00:'+String(Math.min(42,Math.floor(sec))).padStart(2,'0');let idx=-1;for(let i=0;i<cues.length;i++)if(sec>=cues[i].t)idx=i;if(idx!==lastCue){lastCue=idx;const c=cues[idx];caption.classList.remove('show');setTimeout(()=>{caption.textContent=c.text||'';if(c.text)caption.classList.add('show')},250);if(c.scene!=null)setScene(c.scene);if(c.title)title.classList.add('show');if(c.logo){title.classList.remove('show');logo.classList.add('show');scan.classList.add('run')}if(c.end)endFilm()}requestAnimationFrame(tick)}requestAnimationFrame(tick);
try{
const canvas=document.getElementById('filmGL'),renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:false}),scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,100);camera.position.z=5;renderer.setPixelRatio(Math.min(devicePixelRatio,1.6));renderer.setSize(innerWidth,innerHeight);
const count=18000,pos=new Float32Array(count*3),base=new Float32Array(count*3);for(let i=0;i<count;i++){const r=1.5+Math.random()*5,a=Math.random()*Math.PI*2,b=(Math.random()-.5)*Math.PI;const x=Math.cos(a)*Math.cos(b)*r,y=Math.sin(b)*r,z=Math.sin(a)*Math.cos(b)*r;pos.set([x,y,z],i*3);base.set([x,y,z],i*3)}const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));const mat=new THREE.PointsMaterial({color:0xffffff,size:.018,transparent:true,opacity:.55,blending:THREE.AdditiveBlending,depthWrite:false});const pts=new THREE.Points(geo,mat);scene.add(pts);let mx=0,my=0;addEventListener('pointermove',e=>{mx=(e.clientX/innerWidth-.5)*2;my=-(e.clientY/innerHeight-.5)*2});addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});function animate(t){if(ended)return;const p=geo.attributes.position.array;for(let i=0;i<count;i++){const k=i*3,x=base[k],y=base[k+1],z=base[k+2],d=Math.max(.25,Math.hypot(x-mx*2.2,y-my*1.5));p[k]=x+(x-mx*2.2)/d*.11*Math.sin(t*.001+i);p[k+1]=y+(y-my*1.5)/d*.09*Math.cos(t*.0012+i);p[k+2]=z+.16*Math.sin(t*.0007+i*.03)}geo.attributes.position.needsUpdate=true;pts.rotation.y=t*.000035+mx*.08;pts.rotation.x=my*.05;renderer.render(scene,camera);requestAnimationFrame(animate)}requestAnimationFrame(animate)
}catch(e){console.warn('WebGL fallback',e)}
const cur=document.querySelector('.cursor');addEventListener('pointermove',e=>{cur.style.opacity=1;cur.style.transform=`translate(${e.clientX}px,${e.clientY}px)`});addEventListener('scroll',()=>{const max=document.documentElement.scrollHeight-innerHeight;document.querySelector('.progress').style.transform=`scaleX(${max?scrollY/max:0})`},{passive:true});
})();
</script>
</body>
</html>
