name: Site Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check HTML and local assets
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlparse
          import sys

          root = Path('.')
          html = root / 'index.html'
          if not html.exists():
              raise SystemExit('index.html がありません')

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.refs=[]
              def handle_starttag(self, tag, attrs):
                  d=dict(attrs)
                  for key in ('src','href'):
                      v=d.get(key)
                      if v:
                          self.refs.append((tag,key,v))

          p=Parser()
          p.feed(html.read_text(encoding='utf-8'))
          missing=[]
          checked=[]
          for tag,key,ref in p.refs:
              if ref.startswith(('#','mailto:','tel:','data:','javascript:')):
                  continue
              parsed=urlparse(ref)
              if parsed.scheme or parsed.netloc:
                  continue
              path=(root / parsed.path.lstrip('/')).resolve()
              checked.append(parsed.path)
              if parsed.path and not path.exists():
                  missing.append(parsed.path)
          print(f'確認したローカル参照: {len(set(checked))}件')
          if missing:
              print('不足ファイル:')
              for item in sorted(set(missing)):
                  print(' -',item)
              sys.exit(1)
          print('index.html と画像参照に不足はありません')
          PY
      - name: Save deployable snapshot
        uses: actions/upload-artifact@v4
        with:
          name: yoji-hana-site-${{ github.sha }}
          path: |
            index.html
            *.webp
            *.png
            *.jpg
            *.jpeg
            *.svg
            *.mp3
            *.wav
            *.mp4
          if-no-files-found: warn
          retention-days: 30
